name: Collect trend candidates

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      NEWS_RSS_URLS: ${{ vars.NEWS_RSS_URLS }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Validate collector configuration
        run: |
          missing=0
          if [ -z "$NEWS_RSS_URLS" ]; then
            echo "::error::NEWS_RSS_URLS repository variable is required."
            missing=1
          fi
          if [ -z "$SUPABASE_URL" ]; then
            echo "::error::SUPABASE_URL repository secret is required."
            missing=1
          fi
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::SUPABASE_SERVICE_ROLE_KEY repository secret is required."
            missing=1
          fi
          exit "$missing"

      - name: Check collector syntax
        run: npm run check
        working-directory: collector

      - name: Run collector
        run: npm run collect
        working-directory: collector
